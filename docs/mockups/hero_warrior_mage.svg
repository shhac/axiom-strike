<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <title>Hero Character - Warrior Mage (Manga + Pixel Art Style)</title>

  <!-- Background -->
  <rect width="200" height="300" fill="#1a1a2e" rx="8"/>
  <text x="100" y="20" fill="#8888aa" font-family="monospace" font-size="10" text-anchor="middle">HERO - WARRIOR MAGE</text>

  <!-- Character body - pixel art style with manga proportions -->
  <!-- Cape / cloak flowing behind -->
  <polygon points="80,100 60,200 140,200 120,100" fill="#4a2080" opacity="0.7"/>
  <polygon points="75,110 55,210 65,200 80,100" fill="#5a30a0" opacity="0.5"/>

  <!-- Boots -->
  <rect x="78" y="210" width="18" height="20" fill="#443355" rx="2"/>
  <rect x="104" y="210" width="18" height="20" fill="#443355" rx="2"/>
  <rect x="75" y="225" width="22" height="8" fill="#332244" rx="2"/>
  <rect x="102" y="225" width="22" height="8" fill="#332244" rx="2"/>

  <!-- Legs -->
  <rect x="82" y="185" width="14" height="30" fill="#3355aa"/>
  <rect x="104" y="185" width="14" height="30" fill="#3355aa"/>

  <!-- Body / torso armor -->
  <rect x="78" y="120" width="44" height="65" fill="#4466cc" rx="3"/>
  <!-- Chest plate -->
  <rect x="83" y="125" width="34" height="30" fill="#5577dd" rx="2"/>
  <!-- Math symbol on chest - sigma -->
  <text x="100" y="148" fill="#ffdd44" font-family="serif" font-size="22" text-anchor="middle" font-weight="bold">&Sigma;</text>

  <!-- Belt -->
  <rect x="76" y="175" width="48" height="10" fill="#aa7722" rx="1"/>
  <rect x="95" y="174" width="12" height="12" fill="#ddaa33" rx="2"/>

  <!-- Arms -->
  <rect x="62" y="125" width="16" height="40" fill="#4466cc" rx="2"/>
  <rect x="122" y="125" width="16" height="40" fill="#4466cc" rx="2"/>
  <!-- Gloves -->
  <rect x="60" y="160" width="18" height="14" fill="#aa7722" rx="2"/>
  <rect x="122" y="160" width="18" height="14" fill="#aa7722" rx="2"/>

  <!-- Staff in right hand -->
  <rect x="130" y="70" width="6" height="120" fill="#885522" rx="1"/>
  <!-- Staff orb -->
  <circle cx="133" cy="68" r="14" fill="#ff6644" opacity="0.3"/>
  <circle cx="133" cy="68" r="10" fill="#ff8855"/>
  <circle cx="133" cy="68" r="6" fill="#ffaa77"/>
  <text x="133" y="72" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">+</text>

  <!-- Head -->
  <rect x="82" y="80" width="36" height="40" fill="#ffccaa" rx="4"/>
  <!-- Hair - manga spiky -->
  <polygon points="80,90 85,55 95,75 100,50 110,70 118,52 122,85 120,90" fill="#3322aa"/>
  <polygon points="78,92 80,78 85,90" fill="#3322aa"/>
  <polygon points="122,92 120,78 118,88" fill="#3322aa"/>

  <!-- Eyes - large manga style -->
  <ellipse cx="92" cy="96" rx="5" ry="6" fill="#fff"/>
  <ellipse cx="110" cy="96" rx="5" ry="6" fill="#fff"/>
  <circle cx="93" cy="96" r="3.5" fill="#2244aa"/>
  <circle cx="111" cy="96" r="3.5" fill="#2244aa"/>
  <circle cx="94" cy="94" r="1.5" fill="#fff"/>
  <circle cx="112" cy="94" r="1.5" fill="#fff"/>

  <!-- Mouth - determined smile -->
  <path d="M95,108 Q100,113 107,108" stroke="#884444" stroke-width="1.5" fill="none"/>

  <!-- Scarf / bandana -->
  <rect x="78" y="115" width="44" height="8" fill="#ff4444" rx="1"/>
  <polygon points="122,115 140,125 138,118 122,123" fill="#ff4444"/>

  <!-- Floating equation particles around character -->
  <text x="45" y="140" fill="#ffdd44" font-family="monospace" font-size="9" opacity="0.7">7</text>
  <text x="155" y="110" fill="#44ddff" font-family="monospace" font-size="9" opacity="0.7">x</text>
  <text x="50" y="90" fill="#ff7744" font-family="monospace" font-size="9" opacity="0.6">3</text>
  <text x="160" y="160" fill="#77ff77" font-family="monospace" font-size="9" opacity="0.5">=</text>

  <!-- Label -->
  <text x="100" y="260" fill="#aaaacc" font-family="monospace" font-size="9" text-anchor="middle">Concept A: Classic Warrior Mage</text>
  <text x="100" y="275" fill="#666688" font-family="monospace" font-size="8" text-anchor="middle">Manga proportions + pixel detail</text>
  <text x="100" y="288" fill="#666688" font-family="monospace" font-size="8" text-anchor="middle">Math symbols as magical power source</text>
</svg>