<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <title>Recovery / Reading Comprehension Screen Mockup</title>

  <defs>
    <linearGradient id="recoverybg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#0a150a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#recoverybg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="40" fill="#0a0a15" opacity="0.9"/>
  <text x="400" y="26" fill="#44cc66" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">REST &amp; RECOVER</text>

  <!-- Timer -->
  <rect x="680" y="8" width="100" height="24" fill="#1a2a1a" rx="12" stroke="#44cc66" stroke-width="1"/>
  <text x="730" y="24" fill="#44cc66" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">0:42</text>
  <!-- Timer bar -->
  <rect x="690" y="30" width="80" height="3" fill="#1a2a1a" rx="1"/>
  <rect x="690" y="30" width="56" height="3" fill="#44cc66" rx="1"/>

  <!-- HP display -->
  <g transform="translate(20,10)">
    <text x="0" y="0" fill="#888899" font-family="monospace" font-size="8">HP</text>
    <rect x="0" y="4" width="120" height="10" fill="#332244" rx="3"/>
    <rect x="1" y="5" width="42" height="8" fill="#cc4444" rx="2"/>
    <text x="60" y="13" fill="#aaaacc" font-family="monospace" font-size="8" text-anchor="middle">35/100</text>
  </g>

  <!-- === LEFT SIDE: Hero character resting === -->
  <g transform="translate(100,240)">
    <!-- Hero sitting/meditating -->
    <rect x="-20" y="20" width="40" height="30" fill="#4466cc" rx="3"/>
    <rect x="-14" y="-5" width="28" height="25" fill="#ffccaa" rx="4"/>
    <!-- Closed eyes (resting) -->
    <line x1="-7" y1="5" x2="-2" y2="5" stroke="#884444" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3" y1="5" x2="8" y2="5" stroke="#884444" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Peaceful smile -->
    <path d="M-3,12 Q1,15 5,12" stroke="#884444" stroke-width="1" fill="none"/>
    <!-- Hair -->
    <polygon points="-12,-2 -10,-18 -2,-6 3,-16 10,-4 14,0" fill="#3322aa"/>
    <!-- Legs crossed -->
    <ellipse cx="0" cy="55" rx="22" ry="8" fill="#3355aa"/>

    <!-- Healing particles -->
    <circle cx="-25" cy="-10" r="2" fill="#44ff77" opacity="0.4">
      <animate attributeName="cy" from="-10" to="-25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="0" r="2" fill="#44ff77" opacity="0.3">
      <animate attributeName="cy" from="0" to="-20" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.3" to="0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="5" cy="-15" r="1.5" fill="#88ffaa" opacity="0.5">
      <animate attributeName="cy" from="-15" to="-30" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- === RIGHT SIDE: Reading passage === -->
  <g transform="translate(230,55)">
    <!-- Parchment/scroll background -->
    <rect x="0" y="0" width="540" height="300" fill="#1a1a10" rx="8" stroke="#44443a" stroke-width="1"/>

    <!-- Subject tag -->
    <rect x="10" y="10" width="80" height="18" fill="#2a2a1a" rx="4"/>
    <text x="50" y="23" fill="#aaaa77" font-family="monospace" font-size="9" text-anchor="middle">SCIENCE</text>

    <!-- Reading level tag -->
    <rect x="100" y="10" width="60" height="18" fill="#2a2a1a" rx="4"/>
    <text x="130" y="23" fill="#7777aa" font-family="monospace" font-size="9" text-anchor="middle">Level 3</text>

    <!-- Text content -->
    <text x="20" y="55" fill="#ccccaa" font-family="Georgia, serif" font-size="14">The Sun is a star at the centre of our solar system.</text>
    <text x="20" y="75" fill="#ccccaa" font-family="Georgia, serif" font-size="14">It is made up of very hot gases, mostly hydrogen</text>
    <text x="20" y="95" fill="#ccccaa" font-family="Georgia, serif" font-size="14">and helium. The Sun is so large that about 1.3</text>
    <text x="20" y="115" fill="#ccccaa" font-family="Georgia, serif" font-size="14">million Earths could fit inside it.</text>
    <text x="20" y="145" fill="#ccccaa" font-family="Georgia, serif" font-size="14">Light from the Sun takes about 8 minutes to reach</text>
    <text x="20" y="165" fill="#ccccaa" font-family="Georgia, serif" font-size="14">Earth. Without the Sun, life on Earth would not be</text>
    <text x="20" y="185" fill="#ccccaa" font-family="Georgia, serif" font-size="14">possible. Plants need sunlight to grow, and animals</text>
    <text x="20" y="205" fill="#ccccaa" font-family="Georgia, serif" font-size="14">need plants for food.</text>
    <text x="20" y="235" fill="#ccccaa" font-family="Georgia, serif" font-size="14">The temperature at the Sun's surface is about</text>
    <text x="20" y="255" fill="#ccccaa" font-family="Georgia, serif" font-size="14">5,500 degrees Celsius. That's hot enough to melt</text>
    <text x="20" y="275" fill="#ccccaa" font-family="Georgia, serif" font-size="14">any known material on Earth!</text>
  </g>

  <!-- Bottom area - will show questions after timer -->
  <rect x="0" y="380" width="800" height="100" fill="#0a0a15" opacity="0.9"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#333344" stroke-width="1"/>

  <!-- Instruction text (during reading phase) -->
  <text x="400" y="415" fill="#888899" font-family="monospace" font-size="11" text-anchor="middle">Read carefully... A question will appear when the timer ends.</text>
  <text x="400" y="435" fill="#556655" font-family="monospace" font-size="9" text-anchor="middle">Full recovery for a correct answer!</text>

  <!-- Calming visual element -->
  <text x="400" y="465" fill="#334433" font-family="monospace" font-size="20" text-anchor="middle">. . . . . . . . . . .</text>
</svg>