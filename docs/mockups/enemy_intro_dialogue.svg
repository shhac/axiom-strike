<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <title>Enemy Introduction Dialogue - New Concept Scene</title>

  <rect width="800" height="480" fill="#1a1a2e"/>

  <!-- Scene background - darker, dramatic -->
  <rect x="0" y="0" width="800" height="350" fill="#0d0d1e"/>

  <!-- Spotlight effects -->
  <ellipse cx="200" cy="250" rx="120" ry="30" fill="#222244" opacity="0.3"/>
  <ellipse cx="600" cy="250" rx="120" ry="30" fill="#1a3a1a" opacity="0.3"/>

  <!-- === HERO (left side) === -->
  <g transform="translate(200,140)">
    <!-- Body -->
    <rect x="-18" y="20" width="36" height="55" fill="#4466cc" rx="3"/>
    <rect x="-14" y="25" width="28" height="25" fill="#5577dd" rx="2"/>
    <text x="0" y="44" fill="#ffdd44" font-family="serif" font-size="16" text-anchor="middle" font-weight="bold">&Sigma;</text>

    <!-- Head -->
    <rect x="-14" y="-15" width="28" height="32" fill="#ffccaa" rx="4"/>
    <polygon points="-12,-10 -10,-30 -2,-15 3,-28 10,-12 14,-8" fill="#3322aa"/>

    <!-- Eyes - alert/surprised -->
    <ellipse cx="-5" cy="-2" rx="4" ry="5" fill="#fff"/>
    <ellipse cx="7" cy="-2" rx="4" ry="5" fill="#fff"/>
    <circle cx="-4" cy="-1" r="3" fill="#2244aa"/>
    <circle cx="8" cy="-1" r="3" fill="#2244aa"/>
    <circle cx="-3" cy="-3" r="1" fill="#fff"/>
    <circle cx="9" cy="-3" r="1" fill="#fff"/>

    <!-- Mouth - surprised -->
    <ellipse cx="1" cy="10" rx="4" ry="3" fill="#dd8877"/>

    <!-- Arms in ready stance -->
    <rect x="-32" y="25" width="14" height="35" fill="#4466cc" rx="2"/>
    <rect x="18" y="25" width="14" height="35" fill="#4466cc" rx="2"/>

    <!-- Staff -->
    <rect x="20" y="-20" width="5" height="80" fill="#885522"/>
    <circle cx="22" cy="-23" r="10" fill="#ff8855"/>
  </g>

  <!-- === NEW ENEMY: Multiplication Boss (right side, dramatic entrance) === -->
  <g transform="translate(600,120)">
    <!-- Crystal body - large, imposing -->
    <polygon points="0,-20 -40,30 -30,90 0,100 30,90 40,30" fill="#5522aa"/>
    <polygon points="0,-15 -35,30 -25,85 0,94 25,85 35,30" fill="#7744cc"/>

    <!-- Giant X symbol glowing -->
    <line x1="-20" y1="15" x2="20" y2="65" stroke="#ddaaff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="20" y1="15" x2="-20" y2="65" stroke="#ddaaff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

    <!-- Multiple eyes -->
    <circle cx="-12" cy="10" r="6" fill="#eeddff"/>
    <circle cx="12" cy="10" r="6" fill="#eeddff"/>
    <circle cx="0" cy="5" r="5" fill="#eeddff"/>
    <circle cx="-12" cy="10" r="3.5" fill="#440088"/>
    <circle cx="12" cy="10" r="3.5" fill="#440088"/>
    <circle cx="0" cy="5" r="3" fill="#440088"/>

    <!-- Floating crystal shards -->
    <polygon points="-55,0 -60,15 -50,18" fill="#8855cc" opacity="0.7"/>
    <polygon points="55,10 62,0 58,20" fill="#8855cc" opacity="0.7"/>
    <polygon points="-45,-15 -50,-5 -40,-3" fill="#aa77ee" opacity="0.5"/>
    <polygon points="45,-10 52,-15 48,-2" fill="#aa77ee" opacity="0.5"/>

    <!-- Crown -->
    <polygon points="-25,-18 -20,-40 -10,-22 0,-45 10,-22 20,-40 25,-18" fill="#ffcc33"/>

    <!-- Weakness badge -->
    <rect x="-18" y="-58" width="36" height="18" fill="#ff4444" rx="4"/>
    <text x="0" y="-44" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">36</text>

    <!-- Name plate -->
    <rect x="-50" y="105" width="100" height="20" fill="#2a1a3a" rx="4" stroke="#7744cc" stroke-width="1"/>
    <text x="0" y="119" fill="#bb88ee" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">CRYSTAMUL</text>
  </g>

  <!-- === DIALOGUE BOX === -->
  <rect x="0" y="350" width="800" height="130" fill="#0a0a18" opacity="0.95"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="#443366" stroke-width="2"/>

  <!-- Speaker name -->
  <rect x="30" y="340" width="120" height="24" fill="#5522aa" rx="4"/>
  <text x="90" y="357" fill="#ddbbff" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">CRYSTAMUL</text>

  <!-- Dialogue text -->
  <text x="50" y="385" fill="#eeeeff" font-family="Georgia, serif" font-size="15">"MWAHAHAHA! You thought addition was tough?</text>
  <text x="50" y="408" fill="#eeeeff" font-family="Georgia, serif" font-size="15">I am CRYSTAMUL, master of MULTIPLICATION!</text>
  <text x="50" y="431" fill="#eeeeff" font-family="Georgia, serif" font-size="15">My weakness? You'll have to MULTIPLY to find it!"</text>

  <!-- Tap to continue indicator -->
  <text x="700" y="465" fill="#666688" font-family="monospace" font-size="10" text-anchor="middle">TAP TO CONTINUE</text>
  <polygon points="700,468 695,475 705,475" fill="#666688"/>

  <!-- Screen effect - multiplication particles -->
  <text x="100" y="100" fill="#8855cc" font-family="monospace" font-size="16" opacity="0.2">x</text>
  <text x="350" y="80" fill="#8855cc" font-family="monospace" font-size="12" opacity="0.15">x</text>
  <text x="500" y="320" fill="#8855cc" font-family="monospace" font-size="14" opacity="0.1">x</text>
  <text x="700" y="70" fill="#8855cc" font-family="monospace" font-size="18" opacity="0.15">x</text>
</svg>