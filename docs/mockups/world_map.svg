<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <title>World Map Mockup</title>

  <defs>
    <linearGradient id="mapbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#151530"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#mapbg)"/>

  <!-- Title -->
  <text x="400" y="30" fill="#ddddee" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">AXIOM STRIKE - WORLD MAP</text>

  <!-- Stars background -->
  <circle cx="50" cy="60" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="200" cy="80" r="1" fill="#ffffff" opacity="0.2"/>
  <circle cx="350" cy="40" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="500" cy="55" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="650" cy="45" r="1" fill="#ffffff" opacity="0.2"/>
  <circle cx="750" cy="70" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="100" cy="120" r="1" fill="#ffffff" opacity="0.2"/>
  <circle cx="720" cy="130" r="1" fill="#ffffff" opacity="0.3"/>

  <!-- ====== ADDITION REGION (top-left) - Green, nature themed ====== -->
  <g transform="translate(120,140)">
    <!-- Region cloud/area -->
    <ellipse cx="0" cy="0" rx="100" ry="70" fill="#0a2a0a" opacity="0.6"/>
    <text x="0" y="-50" fill="#44dd77" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">ADDITION GROVE</text>
    <text x="0" y="-38" fill="#337744" font-family="monospace" font-size="8" text-anchor="middle">+ Operations</text>

    <!-- Nodes -->
    <!-- Node 1 (completed) -->
    <circle cx="-50" cy="-10" r="12" fill="#33bb66" filter="url(#glow)"/>
    <text x="-50" y="-6" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">1</text>
    <text x="-50" y="8" fill="#44dd77" font-family="monospace" font-size="6" text-anchor="middle">1-digit</text>
    <!-- Star rating -->
    <text x="-50" y="-20" fill="#ffcc33" font-family="monospace" font-size="8" text-anchor="middle">***</text>

    <!-- Path -->
    <line x1="-38" y1="-8" x2="-12" y2="-5" stroke="#33bb66" stroke-width="2" stroke-dasharray="4,2"/>

    <!-- Node 2 (completed) -->
    <circle cx="0" cy="-5" r="12" fill="#33bb66" filter="url(#glow)"/>
    <text x="0" y="-1" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">2</text>
    <text x="0" y="13" fill="#44dd77" font-family="monospace" font-size="6" text-anchor="middle">1-digit</text>
    <text x="0" y="-15" fill="#ffcc33" font-family="monospace" font-size="8" text-anchor="middle">**</text>

    <!-- Path -->
    <line x1="12" y1="-3" x2="38" y2="5" stroke="#33bb66" stroke-width="2" stroke-dasharray="4,2"/>

    <!-- Node 3 (current - pulsing) -->
    <circle cx="50" cy="8" r="14" fill="#228844" stroke="#44ff77" stroke-width="2"/>
    <circle cx="50" cy="8" r="14" fill="none" stroke="#44ff77" stroke-width="1" opacity="0.5">
      <animate attributeName="r" from="14" to="20" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="12" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">3</text>
    <text x="50" y="26" fill="#44dd77" font-family="monospace" font-size="6" text-anchor="middle">2-digit</text>

    <!-- Path to locked -->
    <line x1="50" y1="22" x2="40" y2="40" stroke="#333344" stroke-width="2" stroke-dasharray="4,2"/>

    <!-- Node 4 (locked) -->
    <circle cx="35" cy="48" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="35" y="52" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>
  </g>

  <!-- ====== SUBTRACTION REGION (top-right) - Red/orange, volcanic ====== -->
  <g transform="translate(380,130)">
    <ellipse cx="0" cy="0" rx="100" ry="70" fill="#2a0a0a" opacity="0.6"/>
    <text x="0" y="-50" fill="#ff6644" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">SUBTRACTION PEAKS</text>
    <text x="0" y="-38" fill="#aa4433" font-family="monospace" font-size="8" text-anchor="middle">- Operations</text>

    <!-- Node 1 (available but not started) -->
    <circle cx="-40" cy="-10" r="12" fill="#332222" stroke="#ff6644" stroke-width="1.5"/>
    <text x="-40" y="-6" fill="#ff8866" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">1</text>
    <text x="-40" y="8" fill="#aa4433" font-family="monospace" font-size="6" text-anchor="middle">1-digit</text>

    <line x1="-28" y1="-8" x2="-2" y2="-5" stroke="#333344" stroke-width="2" stroke-dasharray="4,2"/>

    <!-- Node 2 (locked) -->
    <circle cx="10" cy="-5" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="10" y="-1" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>

    <line x1="22" y1="-3" x2="48" y2="5" stroke="#333344" stroke-width="2" stroke-dasharray="4,2"/>

    <!-- Node 3 (locked) -->
    <circle cx="60" cy="8" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="60" y="12" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>

    <!-- Node 4 (locked) -->
    <circle cx="30" cy="45" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="30" y="49" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>
  </g>

  <!-- ====== MULTIPLICATION REGION (bottom-left) - Purple, crystal caves ====== -->
  <g transform="translate(200,340)">
    <ellipse cx="0" cy="0" rx="110" ry="65" fill="#1a0a2a" opacity="0.6"/>
    <text x="0" y="-45" fill="#bb77ff" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">MULTIPLICATION CAVERNS</text>
    <text x="0" y="-33" fill="#8855aa" font-family="monospace" font-size="8" text-anchor="middle">x Operations</text>

    <!-- All locked -->
    <circle cx="-50" cy="-5" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="-50" y="-1" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>

    <line x1="-38" y1="-3" x2="-12" y2="0" stroke="#333344" stroke-width="2" stroke-dasharray="4,2"/>

    <circle cx="0" cy="2" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="0" y="6" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>

    <line x1="12" y1="4" x2="38" y2="10" stroke="#333344" stroke-width="2" stroke-dasharray="4,2"/>

    <circle cx="50" cy="12" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="50" y="16" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>

    <!-- Requires addition note -->
    <rect x="-40" y="30" width="80" height="14" fill="#1a1a2a" rx="3" stroke="#333344" stroke-width="0.5"/>
    <text x="0" y="40" fill="#666677" font-family="monospace" font-size="7" text-anchor="middle">Unlocks after Addition 3</text>
  </g>

  <!-- ====== DIVISION REGION (bottom-right) - Blue, ocean/water ====== -->
  <g transform="translate(560,330)">
    <ellipse cx="0" cy="0" rx="110" ry="65" fill="#0a0a2a" opacity="0.6"/>
    <text x="0" y="-45" fill="#44aaff" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">DIVISION DEPTHS</text>
    <text x="0" y="-33" fill="#3377aa" font-family="monospace" font-size="8" text-anchor="middle">/ Operations</text>

    <!-- All locked -->
    <circle cx="-40" cy="-5" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="-40" y="-1" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>

    <line x1="-28" y1="-3" x2="-2" y2="0" stroke="#333344" stroke-width="2" stroke-dasharray="4,2"/>

    <circle cx="10" cy="2" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="10" y="6" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>

    <line x1="22" y1="4" x2="48" y2="10" stroke="#333344" stroke-width="2" stroke-dasharray="4,2"/>

    <circle cx="60" cy="12" r="12" fill="#1a1a2a" stroke="#333344" stroke-width="1"/>
    <text x="60" y="16" fill="#555566" font-family="monospace" font-size="8" text-anchor="middle">?</text>
  </g>

  <!-- ====== FUTURE DLC REGIONS (faded) ====== -->
  <g transform="translate(650,150)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="70" ry="50" fill="#2a1a0a" opacity="0.4" stroke="#333344" stroke-width="1" stroke-dasharray="6,4"/>
    <text x="0" y="-5" fill="#888866" font-family="monospace" font-size="9" text-anchor="middle">NEGATIVES</text>
    <text x="0" y="8" fill="#666644" font-family="monospace" font-size="7" text-anchor="middle">Coming Soon</text>
  </g>

  <!-- Player position marker on current node -->
  <g transform="translate(170,148)">
    <polygon points="0,-8 -5,0 5,0" fill="#ffcc33">
      <animate attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="1s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Bottom HUD -->
  <rect x="0" y="445" width="800" height="35" fill="#0a0a15" opacity="0.95"/>
  <line x1="0" y1="445" x2="800" y2="445" stroke="#333344" stroke-width="1"/>

  <!-- Player info -->
  <text x="20" y="465" fill="#aaaacc" font-family="monospace" font-size="10">Level: Addition Grove 3</text>

  <!-- Settings -->
  <rect x="680" y="450" width="50" height="24" fill="#222233" rx="4" stroke="#444455" stroke-width="1"/>
  <text x="705" y="466" fill="#888899" font-family="monospace" font-size="9" text-anchor="middle">SHOP</text>

  <rect x="738" y="450" width="50" height="24" fill="#222233" rx="4" stroke="#444455" stroke-width="1"/>
  <text x="763" y="466" fill="#888899" font-family="monospace" font-size="9" text-anchor="middle">OPTS</text>
</svg>