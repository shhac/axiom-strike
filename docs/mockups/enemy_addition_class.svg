<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Enemy Classes - Addition Type Variants</title>

  <rect width="400" height="300" fill="#1a1a2e" rx="8"/>
  <text x="200" y="20" fill="#8888aa" font-family="monospace" font-size="10" text-anchor="middle">ADDITION CLASS ENEMIES</text>

  <!-- MINION: Small round bouncy enemy -->
  <g transform="translate(70,60)">
    <text x="0" y="0" fill="#66aa66" font-family="monospace" font-size="9" text-anchor="middle">MINION</text>

    <!-- Body - round, friendly-aggressive -->
    <circle cx="0" cy="50" r="30" fill="#33cc66"/>
    <circle cx="0" cy="50" r="27" fill="#44dd77"/>

    <!-- Plus symbol as body marking -->
    <rect x="-3" y="35" width="6" height="30" fill="#229944" rx="1"/>
    <rect x="-15" y="47" width="30" height="6" fill="#229944" rx="1"/>

    <!-- Eyes - cute but menacing -->
    <ellipse cx="-10" cy="42" rx="6" ry="7" fill="#fff"/>
    <ellipse cx="10" cy="42" rx="6" ry="7" fill="#fff"/>
    <circle cx="-9" cy="43" r="4" fill="#112211"/>
    <circle cx="11" cy="43" r="4" fill="#112211"/>
    <circle cx="-8" cy="41" r="1.5" fill="#fff"/>
    <circle cx="12" cy="41" r="1.5" fill="#fff"/>

    <!-- Little fangs -->
    <polygon points="-6,56 -3,62 0,56" fill="#fff"/>
    <polygon points="3,56 6,62 9,56" fill="#fff"/>

    <!-- Tiny arms -->
    <rect x="-38" y="44" width="12" height="8" fill="#33cc66" rx="3"/>
    <rect x="26" y="44" width="12" height="8" fill="#33cc66" rx="3"/>

    <!-- Weakness number floating above -->
    <rect x="-14" y="-20" width="28" height="18" fill="#ff4444" rx="4" opacity="0.9"/>
    <text x="0" y="-7" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">7</text>

    <!-- Feet -->
    <ellipse cx="-12" cy="80" rx="8" ry="5" fill="#229944"/>
    <ellipse cx="12" cy="80" rx="8" ry="5" fill="#229944"/>

    <text x="0" y="100" fill="#556655" font-family="monospace" font-size="7" text-anchor="middle">Weakness: 7</text>
    <text x="0" y="110" fill="#556655" font-family="monospace" font-size="7" text-anchor="middle">HP: Low</text>
  </g>

  <!-- STANDARD: Medium humanoid with plus-shaped armor -->
  <g transform="translate(200,60)">
    <text x="0" y="0" fill="#66aa66" font-family="monospace" font-size="9" text-anchor="middle">STANDARD</text>

    <!-- Body -->
    <rect x="-18" y="30" width="36" height="45" fill="#228844" rx="3"/>

    <!-- Plus-shaped armor plate -->
    <rect x="-5" y="25" width="10" height="55" fill="#44ee77" rx="2"/>
    <rect x="-20" y="42" width="40" height="12" fill="#44ee77" rx="2"/>

    <!-- Head - more angular, manga style -->
    <rect x="-14" y="5" width="28" height="28" fill="#66dd88" rx="5"/>

    <!-- Helmet/visor -->
    <rect x="-16" y="5" width="32" height="14" fill="#116633" rx="3"/>

    <!-- Eyes glowing through visor -->
    <rect x="-9" y="10" width="7" height="5" fill="#aaffaa" rx="1"/>
    <rect x="2" y="10" width="7" height="5" fill="#aaffaa" rx="1"/>

    <!-- Arms with plus gauntlets -->
    <rect x="-32" y="35" width="14" height="30" fill="#228844" rx="2"/>
    <rect x="18" y="35" width="14" height="30" fill="#228844" rx="2"/>
    <text x="-25" y="60" fill="#44ee77" font-family="monospace" font-size="10" text-anchor="middle">+</text>
    <text x="25" y="60" fill="#44ee77" font-family="monospace" font-size="10" text-anchor="middle">+</text>

    <!-- Legs -->
    <rect x="-14" y="75" width="12" height="20" fill="#116633" rx="2"/>
    <rect x="2" y="75" width="12" height="20" fill="#116633" rx="2"/>

    <!-- Boots -->
    <rect x="-16" y="90" width="16" height="8" fill="#0a4422" rx="2"/>
    <rect x="0" y="90" width="16" height="8" fill="#0a4422" rx="2"/>

    <!-- Weakness number -->
    <rect x="-14" y="-20" width="28" height="18" fill="#ff4444" rx="4" opacity="0.9"/>
    <text x="0" y="-7" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">15</text>

    <text x="0" y="112" fill="#556655" font-family="monospace" font-size="7" text-anchor="middle">Weakness: 15</text>
    <text x="0" y="122" fill="#556655" font-family="monospace" font-size="7" text-anchor="middle">HP: Medium</text>
  </g>

  <!-- BOSS: Large imposing addition golem -->
  <g transform="translate(340,40)">
    <text x="0" y="0" fill="#ffaa44" font-family="monospace" font-size="9" text-anchor="middle">BOSS</text>

    <!-- Large body -->
    <rect x="-30" y="30" width="60" height="70" fill="#116622" rx="5"/>

    <!-- Giant plus symbol carved into body -->
    <rect x="-5" y="20" width="10" height="85" fill="#33ff66" rx="2" opacity="0.6"/>
    <rect x="-30" y="55" width="60" height="12" fill="#33ff66" rx="2" opacity="0.6"/>

    <!-- Shoulder pads -->
    <ellipse cx="-32" cy="38" rx="12" ry="10" fill="#0a5518"/>
    <ellipse cx="32" cy="38" rx="12" ry="10" fill="#0a5518"/>

    <!-- Head - intimidating -->
    <rect x="-20" y="0" width="40" height="32" fill="#33aa55" rx="6"/>

    <!-- Crown/horns -->
    <polygon points="-18,5 -22,-12 -14,2" fill="#ffcc33"/>
    <polygon points="18,5 22,-12 14,2" fill="#ffcc33"/>
    <polygon points="0,0 -5,-15 5,-15" fill="#ffcc33"/>

    <!-- Eyes - fierce -->
    <rect x="-14" y="10" width="10" height="6" fill="#ff4444" rx="1"/>
    <rect x="4" y="10" width="10" height="6" fill="#ff4444" rx="1"/>

    <!-- Mouth with teeth -->
    <rect x="-12" y="22" width="24" height="6" fill="#082210"/>
    <polygon points="-8,22 -6,27 -4,22" fill="#fff"/>
    <polygon points="-1,22 1,27 3,22" fill="#fff"/>
    <polygon points="6,22 8,27 10,22" fill="#fff"/>

    <!-- Arms - massive -->
    <rect x="-48" y="40" width="20" height="45" fill="#116622" rx="3"/>
    <rect x="28" y="40" width="20" height="45" fill="#116622" rx="3"/>

    <!-- Fists -->
    <rect x="-50" y="80" width="24" height="18" fill="#0a5518" rx="4"/>
    <rect x="26" y="80" width="24" height="18" fill="#0a5518" rx="4"/>

    <!-- Legs -->
    <rect x="-22" y="100" width="18" height="25" fill="#0a5518" rx="3"/>
    <rect x="4" y="100" width="18" height="25" fill="#0a5518" rx="3"/>

    <!-- Weakness number - larger, more prominent -->
    <rect x="-18" y="-30" width="36" height="22" fill="#ff4444" rx="4" opacity="0.9"/>
    <text x="0" y="-14" fill="#fff" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">42</text>

    <text x="0" y="142" fill="#556655" font-family="monospace" font-size="7" text-anchor="middle">Weakness: 42</text>
    <text x="0" y="152" fill="#556655" font-family="monospace" font-size="7" text-anchor="middle">HP: High</text>
  </g>

  <!-- Color palette note -->
  <rect x="10" y="268" width="380" height="24" fill="#111122" rx="4"/>
  <text x="200" y="284" fill="#558855" font-family="monospace" font-size="8" text-anchor="middle">Addition class: Green palette | + motifs in armor/body | Weakness shown in red badge</text>
</svg>